name: verify
on:
  push:
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # verify.sh shells to python3 (catalog_lock.py --check, regen.py --check).
      # Don't rely on the runner image happening to preinstall it.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run verify.sh
        run: bash verify.sh
